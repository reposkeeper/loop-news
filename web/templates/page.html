<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{SITE_TITLE}}</title>
<meta name="description" content="{{PAGE_DESC}}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&display=swap">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<header class="site-header">
  <div class="hwrap">
    <button class="menu-toggle" aria-label="切换菜单">☰</button>
    <a class="brand" href="#">{{SITE_TITLE}}</a>
    <span class="subtitle">{{SITE_SUBTITLE}}</span>
  </div>
</header>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <nav>
      <a class="nav-link" data-target="view-threads" href="#threads">🧵 线索时间线</a>
      <a class="nav-link" data-target="view-favorites" href="#favorites">★ 我的收藏</a>
      {{DOSSIER_NAV}}
      <div class="nav-section">每日</div>
      {{DATE_NAV}}
      <div class="nav-sys">
        <div class="nav-section">系统</div>
        <a class="nav-link" data-target="view-evolution" href="#evolution">⚙️ 自进化日志</a>
        {{SYS_OWNER_NAV}}
      </div>
    </nav>
  </aside>
  <main class="content">
    {{THREADS_VIEW}}
    {{EVOLUTION_VIEW}}
    {{FAVORITES_VIEW}}
    {{DOSSIER_VIEWS}}
    {{DAY_VIEWS}}
  </main>
</div>

<footer class="site-footer"><div class="hwrap">{{FOOTER}}</div></footer>

<!-- 浮动操作:想看的话题(所有访客)+ 全局反馈(owner 专属) -->
<div class="fab-stack">
  <button class="fb fab-feedback" data-act="ask" data-item="__global__" data-date="" data-title="给整站的反馈 / 想法">✍ 反馈</button>
  <button class="fab-req" id="reqBtn">➕ 想看的话题</button>
</div>

<!-- 反馈对话框(页面内,不跳转) -->
<div class="fb-modal" id="fbModal" hidden>
  <div class="fb-card" role="dialog" aria-modal="true" aria-label="反馈">
    <div class="fb-head"><span class="fb-act" id="fbAct"></span><button class="fb-x" id="fbClose" aria-label="关闭">✕</button></div>
    <p class="fb-item" id="fbItem"></p>
    <div class="fb-chips" id="fbChips"></div>
    <textarea class="fb-text" id="fbText" rows="3" placeholder="补充说明(可不写)…"></textarea>
    <div class="fb-foot"><span class="fb-msg" id="fbMsg"></span><button class="fb-submit" id="fbSubmit">提交反馈</button></div>
  </div>
</div>

<!-- 生成分享链接(owner 专属) -->
<div class="fb-modal" id="tokenModal" hidden>
  <div class="fb-card" role="dialog" aria-modal="true" aria-label="生成分享链接">
    <div class="fb-head"><span class="fb-act">🔗 生成分享链接</span><button class="fb-x" id="tokenClose" aria-label="关闭">✕</button></div>
    <p class="fb-item">给朋友生成专属访问链接,填个名字方便区分分享给了谁。</p>
    <input class="fb-text" id="tokenName" placeholder="给谁(如:张三 / 公司同事)…" autocomplete="off">
    <div class="fb-foot"><span class="fb-msg" id="tokenMsg"></span><button class="fb-submit" id="tokenSubmit">生成链接</button></div>
    <div id="tokenResult"></div>
    <div id="tokenList" class="token-list"></div>
  </div>
</div>

<script>window.__FB={enabled:{{FEEDBACK_ENABLED}},api:"{{FEEDBACK_API}}",share:"{{SHARE_API}}",tags:{{FEEDBACK_TAGS}}};</script>
<script>
(function(){
  /* ---- hash 路由:同页切换日期/线索 ---- */
  function showTarget(){
    var raw=(location.hash||"").replace(/^#/, ""), date=raw, item="";
    if(raw.indexOf("__")>-1){var p=raw.split("__");date=p[0];item=p[1];}
    var targetId;
    if(date==="threads"||date==="") targetId="view-threads";
    else if(date==="evolution") targetId="view-evolution";
    else if(date==="favorites") targetId="view-favorites";
    else if(date.indexOf("dossier-")===0) targetId=date;
    else targetId="day-"+date;
    var found=false;
    document.querySelectorAll(".view").forEach(function(v){var on=(v.id===targetId);v.classList.toggle("active",on);if(on)found=true;});
    if(!found){var first=document.querySelector(".view.day");if(first){first.classList.add("active");targetId=first.id;}}
    document.querySelectorAll(".nav-link").forEach(function(a){a.classList.toggle("current",a.getAttribute("data-target")===targetId);});
    if(item){var el=document.getElementById("item-"+item);if(el){el.scrollIntoView({behavior:"smooth",block:"center"});el.classList.add("flash");setTimeout(function(){el.classList.remove("flash");},1600);}}
    else{window.scrollTo(0,0);}
    if(targetId==="view-favorites") loadFavorites();
    if(targetId.indexOf("dossier-")===0) markRead(targetId);
    document.getElementById("sidebar").classList.remove("open");
  }
  window.addEventListener("hashchange",showTarget);
  document.addEventListener("DOMContentLoaded",function(){
    if(!location.hash){var first=document.querySelector(".nav-link.day");if(first){location.hash=first.getAttribute("href");}}
    showTarget();
    loadReads();
  });

  /* ---- 反馈弹窗 ---- */
  var FB=window.__FB||{enabled:false}, API=(FB.api||"").replace(/\/$/,""), SHARE_API=FB.share||"";
  var ACT={up:"👍 赞",down:"👎 踩",adopt:"✓ 采用",ask:"✍ 反馈",request:"➕ 想看的话题"}, tags=FB.tags||{}, picked, current=null;
  function ck(n){var m=document.cookie.match(new RegExp("(?:^|;\\s*)"+n+"=([^;]+)"));return m?decodeURIComponent(m[1]):"";}
  if(ck("lnrole")==="owner") document.body.classList.add("is-owner");
  var modal=document.getElementById("fbModal"),elAct=document.getElementById("fbAct"),elItem=document.getElementById("fbItem"),
      elChips=document.getElementById("fbChips"),elText=document.getElementById("fbText"),elMsg=document.getElementById("fbMsg"),elSubmit=document.getElementById("fbSubmit");
  /* 启动时从服务器拉一次最新常用词(失败则用编译进来的) */
  if(FB.enabled&&API){fetch(API+"/tags").then(function(r){return r.json();}).then(function(t){if(t&&!t.error)tags=Object.assign({},tags,t);}).catch(function(){});}
  function showFbModal(cur){
    current=cur;picked=new Set();elAct.textContent=ACT[current.action]||"反馈";elItem.textContent="「"+(current.title||"")+"」";
    elText.value="";elMsg.textContent="";elSubmit.disabled=false;
    elText.placeholder=current.action==="request"?"描述想持续看到的新闻类型 / 话题…":"补充说明(可不写)…";
    elChips.innerHTML="";(tags[current.action]||[]).forEach(function(tag){
      var c=document.createElement("button");c.type="button";c.className="fb-chip";c.textContent=tag;
      c.onclick=function(){if(picked.has(tag)){picked.delete(tag);c.classList.remove("on");}else{picked.add(tag);c.classList.add("on");}};
      elChips.appendChild(c);
    });
    modal.hidden=false;setTimeout(function(){elText.focus();},40);
  }
  function openModal(btn){showFbModal({action:btn.dataset.act,item_id:btn.dataset.item,date:btn.dataset.date,title:btn.dataset.title});}
  function openRequest(){showFbModal({action:"request",item_id:"__request__",date:"",title:"想持续看到的新闻类型 / 话题(下次采集会去找)"});}
  function closeModal(){modal.hidden=true;current=null;}
  function submitFb(){
    if(!current)return;
    if(!FB.enabled||!API){elMsg.textContent="未配置反馈服务器(config/loop.yaml → feedback.api_url)";return;}
    var isReq=current.action==="request";
    var payload={action:current.action,item_id:current.item_id,date:current.date,title:current.title,tags:Array.from(picked),text:elText.value,token:ck("lnt")};
    elSubmit.disabled=true;elMsg.textContent="提交中…";
    fetch(API+(isReq?"/request":"/feedback"),{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)})
      .then(function(r){return r.json();}).then(function(x){if(x&&x.error){elMsg.textContent="失败:"+x.error;elSubmit.disabled=false;}else{elMsg.textContent=isReq?"已加入,下次采集会找相关内容!":"已记录,谢谢!";setTimeout(closeModal,800);}})
      .catch(function(){elMsg.textContent="提交失败:反馈服务器未启动?";elSubmit.disabled=false;});
  }

  /* ---- 收藏 / 关注(per-user,凭 token)---- */
  function esc(s){return (s||"").replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}
  function toggleAct(btn){
    if(!FB.enabled||!API)return;
    var tok=ck("lnt"); if(!tok){return;}
    var isFav=btn.classList.contains("fav"), on=!btn.classList.contains("on");
    var ep=isFav?"/favorite":"/follow";
    var payload={token:tok,item_id:btn.dataset.item,date:btn.dataset.date,title:btn.dataset.title,on:on};
    if(!isFav){try{payload.topics=JSON.parse(btn.dataset.topics||"[]");payload.entities=JSON.parse(btn.dataset.entities||"[]");}catch(_){}}
    btn.classList.toggle("on",on);
    btn.textContent=isFav?(on?"★ 已收藏":"★ 收藏"):(on?"✓ 已关注":"+ 关注");
    fetch(API+ep,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(payload)})
      .then(function(r){return r.json();}).then(function(x){if(x&&x.error){btn.classList.toggle("on",!on);}}).catch(function(){btn.classList.toggle("on",!on);});
  }
  function removeFav(id){var tok=ck("lnt");if(!API||!tok)return;fetch(API+"/favorite",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({token:tok,item_id:id,on:false})}).then(function(){loadFavorites();});}
  function loadFavorites(){
    var box=document.getElementById("favList"); if(!box)return;
    var tok=ck("lnt");
    if(!FB.enabled||!API||!tok){box.innerHTML='<p class="empty">需要访问令牌后才能查看收藏。</p>';return;}
    box.innerHTML='<p class="empty">加载中…</p>';
    fetch(API+"/favorites?token="+encodeURIComponent(tok)).then(function(r){return r.json();}).then(function(d){
      if(!d.items||!d.items.length){box.innerHTML='<p class="empty">还没有收藏。点新闻底部的「★ 收藏」即可加入。</p>';return;}
      box.innerHTML=d.items.map(function(it){var href="#"+(it.date||"")+"__"+it.item_id;return '<div class="fav-item"><a href="'+href+'"><span class="fav-date">'+esc(it.date||"")+'</span> '+esc(it.title||it.item_id)+'</a><button class="fav-remove" data-item="'+esc(it.item_id)+'">取消</button></div>';}).join("");
    }).catch(function(){box.innerHTML='<p class="empty">加载失败:反馈服务未连接?</p>';});
  }

  /* ---- 专题更新红点(per-user,已读存 R2 reads/<token>)---- */
  function loadReads(){
    var tok=ck("lnt"); if(!FB.enabled||!API||!tok)return;
    fetch(API+"/reads?token="+encodeURIComponent(tok)).then(function(r){return r.json();}).then(function(m){
      if(!m||m.error)m={};
      document.querySelectorAll(".nav-link.dossier").forEach(function(a){
        var id=a.getAttribute("data-target").replace("dossier-",""), up=a.getAttribute("data-updated")||"";
        if(up&&(!m[id]||m[id]<up)) a.classList.add("has-update");
      });
    }).catch(function(){});
  }
  function markRead(targetId){
    var a=document.querySelector('.nav-link.dossier[data-target="'+targetId+'"]'); if(!a)return;
    a.classList.remove("has-update");
    var tok=ck("lnt"); if(!API||!tok)return;
    var id=targetId.replace("dossier-",""), up=a.getAttribute("data-updated")||"";
    fetch(API+"/read",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({token:tok,id:id,ts:up})}).catch(function(){});
  }

  /* ---- 统一点击处理 ---- */
  function shareCard(btn){                                            // 分享 → 服务端按手机卡片出图 → 自动下载
    if(!SHARE_API){return;}
    var card=btn.closest(".card"),cs=card&&card.querySelector(".chart-svg"),chart="";
    if(cs){try{chart="data:image/svg+xml;base64,"+btoa(unescape(encodeURIComponent(cs.outerHTML)));}catch(_){}}
    var pay={title:btn.dataset.title||"",summary:btn.dataset.summary||"",source:btn.dataset.source||"",date:btn.dataset.date||"",kind:btn.dataset.kind||"consensus",badge:btn.dataset.badge||"",quote:btn.dataset.quote||"",chart:chart};
    if(btn.dataset.items){try{pay.items=JSON.parse(btn.dataset.items);}catch(_){}}   // 自进化日志:发布要点
    var old=btn.textContent;btn.textContent="⤴ 生成中…";btn.disabled=true;
    fetch(SHARE_API,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(pay)})
      .then(function(r){if(!r.ok)throw 0;return r.blob();})
      .then(function(b){var u=URL.createObjectURL(b),a=document.createElement("a");a.href=u;a.download=((btn.dataset.title||"loop-news").replace(/[\/\\:*?"<>|\s]/g,"").slice(0,36)||"loop-news")+".png";document.body.appendChild(a);a.click();a.remove();setTimeout(function(){URL.revokeObjectURL(u);},2000);btn.textContent="✓ 已下载";setTimeout(function(){btn.textContent=old;btn.disabled=false;},1600);})
      .catch(function(){btn.textContent="✕ 失败,重试";setTimeout(function(){btn.textContent=old;btn.disabled=false;},1800);});
  }
  /* ---- owner:生成分享链接(填名字区分分享给谁)---- */
  var tokenModal=document.getElementById("tokenModal"),tokenName=document.getElementById("tokenName"),
      tokenMsg=document.getElementById("tokenMsg"),tokenSubmit=document.getElementById("tokenSubmit"),
      tokenResult=document.getElementById("tokenResult"),tokenList=document.getElementById("tokenList");
  function tokenUrl(t){return location.origin+"/?token="+encodeURIComponent(t);}
  function openTokenModal(){if(!API){return;}tokenModal.hidden=false;tokenMsg.textContent="";tokenResult.innerHTML="";loadTokens();setTimeout(function(){tokenName.focus();},40);}
  function closeTokenModal(){tokenModal.hidden=true;}
  function mintToken(){
    var name=tokenName.value.trim(),tok=ck("lnt");
    if(!API||!tok){tokenMsg.textContent="需要 owner 令牌";return;}
    tokenSubmit.disabled=true;tokenMsg.textContent="生成中…";
    fetch(API+"/mint",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({ownerToken:tok,name:name})})
      .then(function(r){return r.json();}).then(function(x){
        tokenSubmit.disabled=false;
        if(x.error){tokenMsg.textContent="失败:"+x.error;return;}
        tokenMsg.textContent="已生成!把链接发给 TA 即可访问。";tokenName.value="";
        tokenResult.innerHTML='<div class="token-new">给 <b>'+esc(x.name)+'</b> 的链接 <button class="token-copy" data-url="'+esc(x.url)+'">复制</button><div class="token-url">'+esc(x.url)+'</div></div>';
        loadTokens();
      }).catch(function(){tokenSubmit.disabled=false;tokenMsg.textContent="失败:服务未连接?";});
  }
  function loadTokens(){
    var tok=ck("lnt");if(!API||!tok){return;}
    fetch(API+"/tokens?ownerToken="+encodeURIComponent(tok)).then(function(r){return r.json();}).then(function(d){
      if(d.error||!d.items||!d.items.length){tokenList.innerHTML="";return;}
      tokenList.innerHTML='<div class="token-list-h">已分享 '+d.items.length+' 人</div>'+d.items.map(function(it){
        return '<div class="token-row"><span class="token-name">'+esc(it.name||"朋友")+'</span><button class="token-copy" data-url="'+esc(tokenUrl(it.token))+'">复制链接</button></div>';
      }).join("");
    }).catch(function(){});
  }
  function copyUrl(btn){
    var url=btn.getAttribute("data-url"),old=btn.textContent,done=function(){btn.textContent="已复制";setTimeout(function(){btn.textContent=old;},1200);};
    if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(url).then(done,done);}
    else{var ta=document.createElement("textarea");ta.value=url;document.body.appendChild(ta);ta.select();try{document.execCommand("copy");}catch(_){}ta.remove();done();}
  }
  document.addEventListener("click",function(e){
    if(e.target.closest("#reqBtn")){openRequest();return;}
    if(e.target.closest("#tokenBtn")){openTokenModal();return;}
    if(e.target.closest("#tokenClose")){closeTokenModal();return;}
    if(e.target.closest("#tokenSubmit")){mintToken();return;}
    var cp=e.target.closest(".token-copy");if(cp){copyUrl(cp);return;}
    if(e.target===tokenModal){closeTokenModal();return;}
    var sh=e.target.closest(".act.share");if(sh){shareCard(sh);return;}
    var act=e.target.closest(".act");if(act){toggleAct(act);return;}
    var rm=e.target.closest(".fav-remove");if(rm){removeFav(rm.dataset.item);return;}
    var fb=e.target.closest(".fb");if(fb){openModal(fb);return;}
    if(e.target.closest(".menu-toggle")){document.getElementById("sidebar").classList.toggle("open");return;}
    if(e.target===modal){closeModal();return;}
    if(e.target.closest("#fbClose")){closeModal();return;}
    if(e.target.closest("#fbSubmit")){submitFb();return;}
    var sb=document.getElementById("sidebar");                       // 点抽屉外 → 关闭(移动端)
    if(sb&&sb.classList.contains("open")&&!e.target.closest("#sidebar")&&!e.target.closest(".menu-toggle")){sb.classList.remove("open");}
  });
  document.addEventListener("keydown",function(e){if(e.key==="Escape"){if(!modal.hidden)closeModal();if(!tokenModal.hidden)closeTokenModal();}});
})();
</script>
</body>
</html>
