<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{SITE_TITLE}}</title>
<meta name="description" content="{{PAGE_DESC}}">
<script>(function(){try{var t=localStorage.getItem("ln-theme")||"auto";document.documentElement.setAttribute("data-theme",t);}catch(e){}})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&display=swap">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="alternate icon" href="favicon.ico" sizes="16x16 32x32 48x48">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="stylesheet" href="assets/style.css">
</head>
<body>
<header class="site-header">
  <div class="hwrap">
    <button class="menu-toggle" aria-label="切换菜单">☰</button>
    <a class="brand" href="#"><img class="brand-mark" src="favicon.svg" alt="" width="26" height="26">{{SITE_TITLE}}</a>
    <span class="subtitle">{{SITE_SUBTITLE}}</span>
    <div class="theme-switch" role="group" aria-label="主题">
      <button class="th" data-theme-set="auto" title="跟随系统">🌗</button>
      <button class="th" data-theme-set="light" title="浅色">☀</button>
      <button class="th" data-theme-set="dark" title="深色">🌙</button>
    </div>
  </div>
</header>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <nav>
      <a class="nav-link" data-target="view-threads" href="#threads">🧵 线索时间线</a>
      <a class="nav-link" data-target="view-favorites" href="#favorites">★ 我的收藏</a>
      {{DOSSIER_NAV}}
      <div class="nav-section">每日</div>
      {{DATE_NAV}}
      <div class="nav-sys">
        <div class="nav-section">系统</div>
        <a class="nav-link" data-target="view-evolution" href="#evolution">⚙️ 自进化日志</a>
        <a class="nav-link" data-target="view-feedback" href="#feedback">📋 反馈台账</a>
        <a class="nav-link nav-owner" data-target="view-dashboard" href="#dashboard">📊 自进化仪表盘</a>
        {{SYS_OWNER_NAV}}
        <button class="nav-link" id="logoutBtn">退出</button>
      </div>
    </nav>
  </aside>
  <main class="content">
    <p class="greeting" id="greeting"></p>
    {{THREADS_VIEW}}
    {{EVOLUTION_VIEW}}
    {{FAVORITES_VIEW}}
    {{FEEDBACK_VIEW}}
    {{DASHBOARD_VIEW}}
    {{DOSSIER_VIEWS}}
    {{DAY_VIEWS}}
  </main>
</div>

<footer class="site-footer"><div class="hwrap">{{FOOTER}}</div></footer>

<!-- 浮动操作:想看的话题(所有访客)+ 全局反馈(owner 专属) -->
<div class="fab-stack">
  <button class="fb fab-feedback" data-act="ask" data-item="__global__" data-date="" data-title="给整站的反馈 / 想法">✍ 反馈</button>
  <button class="fab-req" id="reqBtn">➕ 想看的话题</button>
</div>

<!-- 反馈对话框(页面内,不跳转) -->
<div class="fb-modal" id="fbModal" hidden>
  <div class="fb-card" role="dialog" aria-modal="true" aria-label="反馈">
    <div class="fb-head"><span class="fb-act" id="fbAct"></span><button class="fb-x" id="fbClose" aria-label="关闭">✕</button></div>
    <p class="fb-item" id="fbItem"></p>
    <div class="fb-chips" id="fbChips"></div>
    <textarea class="fb-text" id="fbText" rows="3" placeholder="补充说明(可不写)…"></textarea>
    <div class="fb-foot"><span class="fb-msg" id="fbMsg"></span><button class="fb-submit" id="fbSubmit">提交反馈</button></div>
  </div>
</div>

<!-- 分享图预览(生成后展示,下面下载 / 复制) -->
<div class="fb-modal" id="shareModal" hidden>
  <div class="fb-card share-modal-card" role="dialog" aria-modal="true" aria-label="分享图">
    <div class="fb-head"><span class="fb-act">分享图</span><button class="fb-x" id="shareClose" aria-label="关闭">✕</button></div>
    <div class="share-preview" id="sharePreview"><span class="share-loading">生成中…</span></div>
    <div class="share-actions">
      <button class="share-btn-dl" id="shareDownload">⬇ 下载</button>
      <button class="share-btn-cp" id="shareCopy">⧉ 复制图片</button>
      <span class="fb-msg" id="shareMsg"></span>
    </div>
  </div>
</div>

<script>window.__FB={enabled:{{FEEDBACK_ENABLED}},api:"{{FEEDBACK_API}}",share:"{{SHARE_API}}",tags:{{FEEDBACK_TAGS}}};window.__LEDGER={{LEDGER_JSON}};</script>
<script>
(function(){
  /* ---- 主题:三档切换(auto/light/dark)+ 持久化 + 账号同步 ---- */
  function applyTheme(t){document.documentElement.setAttribute("data-theme",t);
    document.querySelectorAll(".theme-switch .th").forEach(function(b){b.setAttribute("aria-pressed", b.getAttribute("data-theme-set")===t ? "true":"false");});}
  function setTheme(t){try{localStorage.setItem("ln-theme",t);}catch(e){} applyTheme(t);
    if(API) fetch(API+"/me/theme",{method:"POST",credentials:"include",headers:{"Content-Type":"application/json"},body:JSON.stringify({theme:t})}).catch(function(){});}
  function initTheme(){var t="auto";try{t=localStorage.getItem("ln-theme")||"auto";}catch(e){} applyTheme(t);
    document.querySelectorAll(".theme-switch .th").forEach(function(b){b.addEventListener("click",function(){setTheme(b.getAttribute("data-theme-set"));});});}

  /* ---- hash 路由:同页切换日期/线索 ---- */
  function showTarget(){
    var raw=(location.hash||"").replace(/^#/, ""), date=raw, item="";
    if(raw.indexOf("__")>-1){var p=raw.split("__");date=p[0];item=p[1];}
    var targetId;
    if(date==="threads"||date==="") targetId="view-threads";
    else if(date==="evolution") targetId="view-evolution";
    else if(date==="favorites") targetId="view-favorites";
    else if(date==="feedback") targetId="view-feedback";
    else if(date==="dashboard") targetId="view-dashboard";
    else if(date.indexOf("dossier-")===0) targetId=date;
    else targetId="day-"+date;
    var found=false;
    document.querySelectorAll(".view").forEach(function(v){var on=(v.id===targetId);v.classList.toggle("active",on);if(on)found=true;});
    if(!found){var first=document.querySelector(".view.day");if(first){first.classList.add("active");targetId=first.id;}}
    reportView(item?(targetId+"__"+item):targetId);
    document.querySelectorAll(".nav-link").forEach(function(a){a.classList.toggle("current",a.getAttribute("data-target")===targetId);});
    if(item){var el=document.getElementById("item-"+item);if(el){el.scrollIntoView({behavior:"smooth",block:"center"});el.classList.add("flash");setTimeout(function(){el.classList.remove("flash");},1600);}}
    else{window.scrollTo(0,0);}
    if(targetId==="view-favorites") loadFavorites();
    if(targetId==="view-feedback") loadFeedbackLedger();
    if(targetId.indexOf("dossier-")===0) markRead(targetId);
    document.getElementById("sidebar").classList.remove("open");
  }
  window.addEventListener("hashchange",showTarget);
  document.addEventListener("DOMContentLoaded",function(){
    if(!location.hash){var first=document.querySelector(".nav-link.day");if(first){location.hash=first.getAttribute("href");}}
    showTarget();
    loadReads();
    initTheme();
  });

  /* ---- 反馈弹窗 ---- */
  var FB=window.__FB||{enabled:false}, API=(FB.api||"").replace(/\/$/,""), SHARE_API=FB.share||"";
  /* ---- 浏览活动 beacon(view 去抖,凭 session cookie,静默失败不阻塞页面)---- */
  var _lastView="";
  function reportView(t){
    if(!API||!t||t===_lastView)return; _lastView=t;
    fetch(API+"/activity",{method:"POST",credentials:"include",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"view",target:t})}).catch(function(){});
  }
  var ACT={up:"👍 赞",down:"👎 踩",adopt:"✓ 采用",ask:"✍ 反馈",request:"➕ 想看的话题"}, tags=FB.tags||{}, picked, current=null;
  function ck(n){var m=document.cookie.match(new RegExp("(?:^|;\\s*)"+n+"=([^;]+)"));return m?decodeURIComponent(m[1]):"";}
  if(ck("lnrole")==="owner") document.body.classList.add("is-owner");
  if(API){fetch(API+"/me",{credentials:"include"}).then(function(r){return r.ok?r.json():null;}).then(function(u){
    if(!u)return;
    if(u.role==="owner") document.body.classList.add("is-owner");
    var el=document.getElementById("greeting");
    if(el&&u.name){el.textContent="你好，"+u.name;el.style.display="";}
    try{ if(!localStorage.getItem("ln-theme") && u.theme){ localStorage.setItem("ln-theme",u.theme); applyTheme(u.theme);} }catch(e){}
  }).catch(function(){});}
  var modal=document.getElementById("fbModal"),elAct=document.getElementById("fbAct"),elItem=document.getElementById("fbItem"),
      elChips=document.getElementById("fbChips"),elText=document.getElementById("fbText"),elMsg=document.getElementById("fbMsg"),elSubmit=document.getElementById("fbSubmit");
  /* 启动时从服务器拉一次最新常用词(失败则用编译进来的) */
  if(FB.enabled&&API){fetch(API+"/tags").then(function(r){return r.json();}).then(function(t){if(t&&!t.error)tags=Object.assign({},tags,t);}).catch(function(){});}
  function showFbModal(cur){
    current=cur;picked=new Set();elAct.textContent=ACT[current.action]||"反馈";elItem.textContent="「"+(current.title||"")+"」";
    elText.value="";elMsg.textContent="";elSubmit.disabled=false;
    elText.placeholder=current.action==="request"?"描述想持续看到的新闻类型 / 话题…":"补充说明(可不写)…";
    elChips.innerHTML="";(tags[current.action]||[]).forEach(function(tag){
      var c=document.createElement("button");c.type="button";c.className="fb-chip";c.textContent=tag;
      c.onclick=function(){if(picked.has(tag)){picked.delete(tag);c.classList.remove("on");}else{picked.add(tag);c.classList.add("on");}};
      elChips.appendChild(c);
    });
    modal.hidden=false;setTimeout(function(){elText.focus();},40);
  }
  function openModal(btn){showFbModal({action:btn.dataset.act,item_id:btn.dataset.item,date:btn.dataset.date,title:btn.dataset.title});}
  function openRequest(){showFbModal({action:"request",item_id:"__request__",date:"",title:"想持续看到的新闻类型 / 话题(下次采集会去找)"});}
  function closeModal(){modal.hidden=true;current=null;}
  function submitFb(){
    if(!current)return;
    if(!FB.enabled||!API){elMsg.textContent="未配置反馈服务器(config/loop.yaml → feedback.api_url)";return;}
    var isReq=current.action==="request";
    var payload={action:current.action,item_id:current.item_id,date:current.date,title:current.title,tags:Array.from(picked),text:elText.value};
    elSubmit.disabled=true;elMsg.textContent="提交中…";
    fetch(API+(isReq?"/request":"/feedback"),{method:"POST",headers:{"Content-Type":"application/json"},credentials:"include",body:JSON.stringify(payload)})
      .then(function(r){return r.json();}).then(function(x){if(x&&x.error){elMsg.textContent="失败:"+x.error;elSubmit.disabled=false;}else{elMsg.textContent=isReq?"已加入,下次采集会找相关内容!":"已记录,谢谢!";setTimeout(closeModal,800);}})
      .catch(function(){elMsg.textContent="提交失败:反馈服务器未启动?";elSubmit.disabled=false;});
  }

  /* ---- 收藏 / 关注(per-user,凭 session cookie)---- */
  function esc(s){return (s||"").replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];});}
  function toggleAct(btn){
    if(!FB.enabled||!API)return;
    var isFav=btn.classList.contains("fav"), on=!btn.classList.contains("on");
    var ep=isFav?"/favorite":"/follow";
    var payload={item_id:btn.dataset.item,date:btn.dataset.date,title:btn.dataset.title,on:on};
    if(!isFav){try{payload.topics=JSON.parse(btn.dataset.topics||"[]");payload.entities=JSON.parse(btn.dataset.entities||"[]");}catch(_){}}
    btn.classList.toggle("on",on);
    btn.textContent=isFav?(on?"★ 已收藏":"★ 收藏"):(on?"✓ 已关注":"+ 关注");
    fetch(API+ep,{method:"POST",headers:{"Content-Type":"application/json"},credentials:"include",body:JSON.stringify(payload)})
      .then(function(r){return r.json();}).then(function(x){if(x&&x.error){btn.classList.toggle("on",!on);}}).catch(function(){btn.classList.toggle("on",!on);});
  }
  function removeFav(id){if(!API)return;fetch(API+"/favorite",{method:"POST",headers:{"Content-Type":"application/json"},credentials:"include",body:JSON.stringify({item_id:id,on:false})}).then(function(){loadFavorites();});}
  function loadFavorites(){
    var box=document.getElementById("favList"); if(!box)return;
    if(!FB.enabled||!API){box.innerHTML='<p class="empty">需要登录后才能查看收藏。</p>';return;}
    box.innerHTML='<p class="empty">加载中…</p>';
    fetch(API+"/favorites",{credentials:"include"}).then(function(r){return r.json();}).then(function(d){
      if(!d.items||!d.items.length){box.innerHTML='<p class="empty">还没有收藏。点新闻底部的「★ 收藏」即可加入。</p>';return;}
      box.innerHTML=d.items.map(function(it){var href="#"+(it.date||"")+"__"+it.item_id;return '<div class="fav-item"><a href="'+href+'"><span class="fav-date">'+esc(it.date||"")+'</span> '+esc(it.title||it.item_id)+'</a><button class="fav-remove" data-item="'+esc(it.item_id)+'">取消</button></div>';}).join("");
    }).catch(function(){box.innerHTML='<p class="empty">加载失败:反馈服务未连接?</p>';});
  }

  /* ---- 反馈台账:实时反馈 + 覆盖状态(对照 window.__LEDGER)---- */
  function loadFeedbackLedger(){
    var box=document.getElementById("fbLedgerLive"); if(!box)return;
    if(!FB.enabled||!API){box.innerHTML='<p class="empty">未配置反馈服务。</p>';return;}
    var covered=[];(((window.__LEDGER||{}).cycles)||[]).forEach(function(cy){(cy.covered||[]).forEach(function(c){covered.push({text:c.text||"",date:cy.date});});});
    function cov(t){t=t||"";for(var i=0;i<covered.length;i++){var x=covered[i].text;if(x&&t&&(t.indexOf(x)>-1||x.indexOf(t)>-1))return covered[i].date;}return null;}
    box.innerHTML='<p class="empty">加载中…</p>';
    Promise.all([
      fetch(API+"/requests").then(function(r){return r.json();}).catch(function(){return{items:[]};}),
      fetch(API+"/feedback").then(function(r){return r.json();}).catch(function(){return{items:[]};})
    ]).then(function(res){
      var reqs=((res[0]||{}).items||[]).map(function(it){return {kind:"请求",text:it.text||(it.tags||[]).join(" ")};});
      var LAB={up:"赞",down:"踩",adopt:"采用",ask:"提问"};
      var fbs=((res[1]||{}).items||[]).map(function(it){return {kind:(LAB[it.action]||it.action),text:(it.text||(it.tags||[]).join(" "))+(it.title?(" · 「"+it.title+"」"):"")};});
      var all=reqs.concat(fbs);
      if(!all.length){box.innerHTML='<p class="empty">还没有反馈。点新闻底部的 👍/👎/✓,或右下「➕ 想看的话题」。</p>';return;}
      box.innerHTML=all.map(function(x){var d=cov(x.text);var badge=d?'<span class="lg-cov">✓ 已覆盖 · '+esc(d)+'</span>':'<span class="lg-pending">待处理</span>';return '<div class="lg-live"><span class="lg-type">'+esc(x.kind)+'</span><span class="lg-text">'+esc(x.text||"(无文字)")+'</span>'+badge+'</div>';}).join("");
    }).catch(function(){box.innerHTML='<p class="empty">加载失败:反馈服务未连接?</p>';});
  }

  /* ---- 专题更新红点(per-user,已读存 R2 reads/<uid>)---- */
  function loadReads(){
    if(!FB.enabled||!API)return;
    fetch(API+"/reads",{credentials:"include"}).then(function(r){return r.json();}).then(function(m){
      if(!m||m.error)m={};
      document.querySelectorAll(".nav-link.dossier").forEach(function(a){
        var id=a.getAttribute("data-target").replace("dossier-",""), up=a.getAttribute("data-updated")||"";
        if(up&&(!m[id]||m[id]<up)) a.classList.add("has-update");
      });
    }).catch(function(){});
  }
  function markRead(targetId){
    var a=document.querySelector('.nav-link.dossier[data-target="'+targetId+'"]'); if(!a)return;
    a.classList.remove("has-update");
    if(!API)return;
    var id=targetId.replace("dossier-",""), up=a.getAttribute("data-updated")||"";
    fetch(API+"/read",{method:"POST",headers:{"Content-Type":"application/json"},credentials:"include",body:JSON.stringify({id:id,ts:up})}).catch(function(){});
  }

  /* ---- 统一点击处理 ---- */
  /* ---- 分享出图:生成后预览,可下载/复制 ---- */
  var shareModal=document.getElementById("shareModal"),sharePreview=document.getElementById("sharePreview"),
      shareMsg=document.getElementById("shareMsg"),_shareBlob=null,_shareName="loop-news";
  function shareCard(btn){
    if(API){fetch(API+"/activity",{method:"POST",credentials:"include",headers:{"Content-Type":"application/json"},body:JSON.stringify({action:"share_image",target:btn.dataset.item||""})}).catch(function(){});}
    if(!SHARE_API){return;}
    var card=btn.closest(".card"),cs=card&&card.querySelector(".chart-svg"),chart="";
    if(cs){try{chart="data:image/svg+xml;base64,"+btoa(unescape(encodeURIComponent(cs.outerHTML)));}catch(_){}}
    var pay={id:btn.dataset.item||"",title:btn.dataset.title||"",summary:btn.dataset.summary||"",source:btn.dataset.source||"",date:btn.dataset.date||"",kind:btn.dataset.kind||"consensus",badge:btn.dataset.badge||"",quote:btn.dataset.quote||"",chart:chart};
    if(btn.dataset.items){try{pay.items=JSON.parse(btn.dataset.items);}catch(_){}}   // 自进化日志:发布要点
    _shareName=((btn.dataset.title||"loop-news").replace(/[\/\\:*?"<>|\s]/g,"").slice(0,36)||"loop-news");
    _shareBlob=null;shareMsg.textContent="";sharePreview.innerHTML='<span class="share-loading">生成中…</span>';shareModal.hidden=false;
    var tries=0;
    (function attempt(){
      tries++;
      fetch(SHARE_API,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(pay)})
        .then(function(r){if(!r.ok)throw 0;return r.blob();})
        .then(function(b){_shareBlob=b;sharePreview.innerHTML='<img alt="分享图" src="'+URL.createObjectURL(b)+'">';})
        .catch(function(){
          if(tries<3){sharePreview.innerHTML='<span class="share-loading">生成中…(重试 '+tries+')</span>';setTimeout(attempt,600*tries);}
          else{sharePreview.innerHTML='<span class="share-loading">生成失败,关闭重试</span>';}
        });
    })();
  }
  function closeShare(){shareModal.hidden=true;}
  function shareDownloadFn(){
    if(!_shareBlob)return;var u=URL.createObjectURL(_shareBlob),a=document.createElement("a");a.href=u;a.download=_shareName+".png";document.body.appendChild(a);a.click();a.remove();setTimeout(function(){URL.revokeObjectURL(u);},2000);shareMsg.textContent="已下载";
  }
  function shareCopyFn(){
    if(!_shareBlob){return;}
    if(navigator.clipboard&&window.ClipboardItem){
      navigator.clipboard.write([new ClipboardItem({"image/png":_shareBlob})]).then(function(){shareMsg.textContent="已复制到剪贴板";},function(){shareMsg.textContent="复制失败,请用下载";});
    }else{shareMsg.textContent="此浏览器不支持复制图片,请用下载";}
  }
  document.getElementById("logoutBtn")&&document.getElementById("logoutBtn").addEventListener("click",function(){fetch(API+"/auth/logout",{method:"POST",credentials:"include"}).then(function(){location.reload();});});
  document.addEventListener("click",function(e){
    if(e.target.closest("#reqBtn")){openRequest();return;}
    var sh=e.target.closest(".act.share");if(sh){shareCard(sh);return;}
    if(e.target.closest("#shareClose")){closeShare();return;}
    if(e.target.closest("#shareDownload")){shareDownloadFn();return;}
    if(e.target.closest("#shareCopy")){shareCopyFn();return;}
    if(e.target===shareModal){closeShare();return;}
    var act=e.target.closest(".act");if(act){toggleAct(act);return;}
    var rm=e.target.closest(".fav-remove");if(rm){removeFav(rm.dataset.item);return;}
    var fb=e.target.closest(".fb");if(fb){openModal(fb);return;}
    if(e.target.closest(".menu-toggle")){document.getElementById("sidebar").classList.toggle("open");return;}
    if(e.target===modal){closeModal();return;}
    if(e.target.closest("#fbClose")){closeModal();return;}
    if(e.target.closest("#fbSubmit")){submitFb();return;}
    var sb=document.getElementById("sidebar");                       // 点抽屉外 → 关闭(移动端)
    if(sb&&sb.classList.contains("open")&&!e.target.closest("#sidebar")&&!e.target.closest(".menu-toggle")){sb.classList.remove("open");}
  });
  document.addEventListener("keydown",function(e){if(e.key==="Escape"){if(!modal.hidden)closeModal();if(!shareModal.hidden)closeShare();}});
})();
</script>
</body>
</html>
