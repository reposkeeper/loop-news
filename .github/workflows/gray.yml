name: Deploy Gray

# 灰度环境(gray-*.xdzq.org):push 到 gray 分支即部署候选代码。
# 与生产【共享】KV/D1/R2/cookie —— 见 GRAY.md。用真实账号/数据在候选代码上验证。
on:
  push:
    branches: [gray]
  workflow_dispatch:

concurrency:
  group: deploy-gray
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: gray            # ← 关联 GitHub Environment: gray(其 secret CLOUDFLARE_API_TOKEN 生效)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: npm install
      - name: Apply D1 schema (shared DB, idempotent CREATE TABLE IF NOT EXISTS)
        run: npx wrangler d1 execute loop-news-db --remote --file worker/schema.sql
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Deploy gray (Pages + feedback Worker + share Worker)
        run: bash scripts/deploy-gray.sh
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
