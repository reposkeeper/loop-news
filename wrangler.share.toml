# Cloudflare Worker 配置:Loop News 分享出图(Satori+resvg / workers-og)。
# 与反馈 API 分开部署(隔离重依赖),挂到 share.xdzq.org。
# 部署:npx wrangler deploy -c wrangler.share.toml
name = "loop-news-share"
main = "worker/share-worker.js"
compatibility_date = "2026-06-01"

routes = [
  { pattern = "share.xdzq.org", custom_domain = true }
]

# 渲染缓存:同一张卡按 id 缓存 PNG(命中秒发,预热后用户点分享几乎不触发渲染)。复用反馈同桶。
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "loop-news"
