# 新闻来源清单 —— ln-collect 读取本文件决定抓什么。
# 两大类:consensus(求快求广) / deep(求原汁原味)。
# 进化步骤(ln-evolve)可增删来源,并在 prompts/CHANGELOG.md 记录原因。

# ── 共识类:各大媒体都在报道的、最新的 Breaking News ──
consensus:
  # 用 WebSearch 跑这些 query 抓最新共识热点(跨语种)
  web_search_queries:
    - "AI 人工智能 重大新闻 今天"
    - "AI agent 智能体 企业应用 最新"                 # ↑AI 权重(反馈:AI 内容太少)
    - "AI 安全 前沿模型 frontier model safety 最新"    # 关注聚合:AI 安全 / 前沿模型
    - "机器人 具身智能 embodied AI 创业公司 融资 最新"  # 请求:机器人/具身智能创业融资
    - "AI harness eval agent 企业落地 最新"            # 请求:AI 在企业中的应用(harness engineering)
    - "AI 芯片 算力 GPU Nvidia 台积电 最新"            # 广度:AI 芯片/算力
    - "中国 AI 大模型 DeepSeek Qwen 华为昇腾 最新"     # 广度:中国 AI
    - "AI 融资 并购 IPO 估值 最新"                     # 广度:资本
    - "AI 争议 安全事件 隐私 泄露 最新"                # 广度:AI 安全/争议(易引爆圈层)
    - "AI 产品发布 model release today"               # 广度:新模型/产品
    - "global economy breaking news today"
    - "technology breaking news today"
    - "美联储 / 央行 政策 最新"
    - "geopolitics breaking news today"
  # 主流媒体 RSS(WebFetch 抓取 + 解析)
  rss:
    - { name: "Reuters World",  url: "https://www.reuters.com/arc/outboundfeeds/news-sitemap-index/?outputType=xml" }
    - { name: "AP Top News",    url: "https://feeds.apnews.com/rss/apf-topnews" }
    - { name: "BBC World",      url: "https://feeds.bbci.co.uk/news/world/rss.xml" }
    - { name: "NYT World",      url: "https://rss.nytimes.com/services/xml/rss/nyt/World.xml" }
    - { name: "财新网",         url: "https://www.caixin.com/rss/all.xml" }
    - { name: "TechCrunch AI",  url: "https://techcrunch.com/category/artificial-intelligence/feed/" }   # ↑AI 权重
    - { name: "VentureBeat AI", url: "https://venturebeat.com/category/ai/feed/" }
    - { name: "MIT Tech Review", url: "https://www.technologyreview.com/feed/" }

# ── 深度类:不在大众视野、但能引发圈层共鸣的原声 ──
deep:
  # 深度长文 / 独立观点(Substack、博客 RSS;抓全文)
  substack_rss:
    - { name: "Stratechery (Ben Thompson)", url: "https://stratechery.com/feed/" }
    - { name: "Import AI (Jack Clark)",      url: "https://importai.substack.com/feed" }
    - { name: "One Useful Thing (Ethan Mollick)", url: "https://www.oneusefulthing.org/feed" }
    - { name: "Noahpinion (Noah Smith)",     url: "https://www.noahpinion.blog/feed" }
  # 圈层讨论(交叉验证一条新闻在专业圈的真实反应)
  # Reddit 全站 WebFetch 被拦(2026-06-30 实测)→ 仅作"信号":用 WebSearch 限定 reddit.com 找热帖方向,拿不到全文
  reddit:
    - r/MachineLearning
    - r/LocalLLaMA
    - r/Economics
    - r/singularity
  hackernews:
    - frontpage   # ✅ 用 Algolia API:https://hn.algolia.com/api/v1/search?tags=front_page
  # X 名人原声(见 config/people.yaml):首选 X MCP 直采原始推文;未接入则走 WebSearch 还原引用(见 prompts/collect.deep.md)
  x:
    via: mcp        # 待 X MCP 接入
    fallback: websearch

# ── 中文高质量平台(反馈新增:即刻)──
cn_platforms:
  # 即刻(Jike):高质量 AI / 科技圈讨论。内容多需登录;可行做法:WebSearch 限定 okjike.com 找公开热帖 / 圈子方向,
  #   顺到一手链接再 WebFetch;抓不到全文时仅作信号(话题热度),不臆造内容。
  - { name: "即刻 Jike", method: "websearch site:okjike.com", topics: ["AI", "大模型", "AI 创业", "AI 产品"] }

# ── 🎙️ 播客(知名主持 × 知名 AI 人物的整集深访)──
# 节目清单与重点嘉宾见 config/podcasts.yaml;ln-collect 找最新集 → 当日「🎙️ 播客」区。
podcasts_config: config/podcasts.yaml
